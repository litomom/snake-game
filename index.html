<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }
        .game-container {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #fff;
        }
        .header h1 {
            font-size: 24px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        .score {
            font-size: 20px;
            color: #0f3460;
            background: #e94560;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        canvas {
            border: 3px solid #0f3460;
            border-radius: 10px;
            background: #0f3460;
            display: block;
            margin: 0 auto;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        button {
            padding: 10px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-start {
            background: #e94560;
            color: white;
        }
        .btn-start:hover {
            background: #c73650;
            transform: translateY(-2px);
        }
        .btn-restart {
            background: #0f3460;
            color: white;
        }
        .btn-restart:hover {
            background: #1a4a7a;
            transform: translateY(-2px);
        }
        .hint {
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
        }
        @media (max-width: 500px) {
            .game-container { padding: 15px; }
            canvas { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score">分数: <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button class="btn-start" id="startBtn">开始游戏</button>
            <button class="btn-restart" id="restartBtn">重新开始</button>
        </div>
        <div class="hint">使用方向键 ↑ ↓ ← → 控制蛇的移动</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const TICK_INTERVAL = 150;

        let snake, direction, nextDirection, food, score, gameLoop, isRunning;

        function init() {
            const mid = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: mid, y: mid },
                { x: mid - 1, y: mid },
                { x: mid - 2, y: mid }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            isRunning = false;
            scoreSpan.textContent = '0';
            spawnFood();
            draw();
        }

        function spawnFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if (snake.length >= totalCells) {
                alert('恭喜你赢了！所有格子都填满了！');
                stopGame();
                return;
            }
            const snakeSet = new Set(snake.map(c => `${c.x},${c.y}`));
            const freeCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!snakeSet.has(`${i},${j}`)) {
                        freeCells.push({ x: i, y: j });
                    }
                }
            }
            if (freeCells.length === 0) {
                alert('恭喜你赢了！所有格子都填满了！');
                stopGame();
                return;
            }
            food = freeCells[Math.floor(Math.random() * freeCells.length)];
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = '#1a4a7a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
            const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
            ctx.arc(fx, fy, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((seg, i) => {
                const ratio = 1 - i / snake.length;
                const r = Math.round(46 + 189 * ratio);
                const g = Math.round(69 + 30 * ratio);
                const b = Math.round(96);
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                const padding = i === 0 ? 1 : 2;
                const radius = 4;
                const x = seg.x * CELL_SIZE + padding;
                const y = seg.y * CELL_SIZE + padding;
                const w = CELL_SIZE - padding * 2;
                const h = CELL_SIZE - padding * 2;
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + w - radius, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
                ctx.lineTo(x + w, y + h - radius);
                ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
                ctx.lineTo(x + radius, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();

                // 蛇头眼睛
                if (i === 0) {
                    ctx.fillStyle = 'white';
                    let ex1, ey1, ex2, ey2;
                    if (direction.x === 1) {
                        ex1 = x + w - 6; ey1 = y + 3;
                        ex2 = x + w - 6; ey2 = y + h - 3;
                    } else if (direction.x === -1) {
                        ex1 = x + 6; ey1 = y + 3;
                        ex2 = x + 6; ey2 = y + h - 3;
                    } else if (direction.y === -1) {
                        ex1 = x + 3; ey1 = y + 6;
                        ex2 = x + w - 3; ey2 = y + 6;
                    } else {
                        ex1 = x + 3; ey1 = y + h - 6;
                        ex2 = x + w - 3; ey2 = y + h - 6;
                    }
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function update() {
            direction = { ...nextDirection };
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 撞墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // 撞自身检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreSpan.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            stopGame();
            draw();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 36px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 20;
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#fff';
            ctx.font = '20px Segoe UI, sans-serif';
            ctx.shadowBlur = 0;
            ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
            startBtn.textContent = '重新开始';
        }

        function startGame() {
            if (isRunning) return;
            isRunning = true;
            startBtn.textContent = '游戏中...';
            startBtn.disabled = true;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, TICK_INTERVAL);
        }

        function stopGame() {
            isRunning = false;
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
        }

        function restartGame() {
            stopGame();
            init();
            startBtn.textContent = '开始游戏';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;
            const key = e.key;
            e.preventDefault();
            if (key === 'ArrowUp' && direction.y !== 1) {
                nextDirection = { x: 0, y: -1 };
            } else if (key === 'ArrowDown' && direction.y !== -1) {
                nextDirection = { x: 0, y: 1 };
            } else if (key === 'ArrowLeft' && direction.x !== 1) {
                nextDirection = { x: -1, y: 0 };
            } else if (key === 'ArrowRight' && direction.x !== -1) {
                nextDirection = { x: 1, y: 0 };
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        // 移动端触摸控制
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!isRunning) return;
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
            e.preventDefault();
        }, { passive: false });

        init();
    </script>
</body>
</html>
